<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320" role="img" aria-label="How clawprint works in three steps: scan your agent config, commit the manifest, and let CI catch capability changes in every PR">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#F59E0B"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="898" height="318" rx="18" fill="#0B1220" stroke="#1E293B" stroke-width="2"/>

  <!-- step 1 card: your agent config -->
  <g>
    <circle cx="60" cy="62" r="17" fill="url(#accent)"/>
    <text x="60" y="68" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="17" font-weight="800" fill="#0B1220">1</text>
    <text x="88" y="68" font-family="'Segoe UI', system-ui, sans-serif" font-size="17" font-weight="700" fill="#F8FAFC">Your agent config</text>
    <rect x="42" y="88" width="230" height="176" rx="12" fill="#0F172A" stroke="#273449"/>
    <g font-family="ui-monospace, Consolas, monospace" font-size="13.5" fill="#94A3B8">
      <text x="62" y="120" fill="#E2E8F0">.claude/</text>
      <text x="78" y="144">skills/</text>
      <text x="78" y="168">agents/</text>
      <text x="78" y="192">commands/</text>
      <text x="78" y="216">settings.json <tspan fill="#64748B">(hooks)</tspan></text>
      <text x="62" y="240">.mcp.json · CLAUDE.md</text>
    </g>
  </g>

  <path d="M 282 176 L 322 176" stroke="#F59E0B" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- step 2 card: the manifest -->
  <g>
    <circle cx="352" cy="62" r="17" fill="url(#accent)"/>
    <text x="352" y="68" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="17" font-weight="800" fill="#0B1220">2</text>
    <text x="380" y="68" font-family="'Segoe UI', system-ui, sans-serif" font-size="17" font-weight="700" fill="#F8FAFC">One committed manifest</text>
    <rect x="334" y="88" width="238" height="176" rx="12" fill="#0F172A" stroke="#273449"/>
    <g font-family="ui-monospace, Consolas, monospace" font-size="13.5">
      <text x="354" y="120" fill="#E2E8F0">CLAWPRINT.md</text>
      <text x="354" y="146" fill="#94A3B8">- commands: node, curl</text>
      <text x="354" y="170" fill="#94A3B8">- network: api.example.test</text>
      <text x="354" y="194" fill="#94A3B8">- env: GITHUB_TOKEN</text>
      <text x="354" y="218" fill="#94A3B8">- paths: ~/.cache/…</text>
      <text x="354" y="244" fill="#64748B">sha256 per file + item</text>
    </g>
  </g>

  <path d="M 582 176 L 622 176" stroke="#F59E0B" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- step 3 card: the PR diff -->
  <g>
    <circle cx="652" cy="62" r="17" fill="url(#accent)"/>
    <text x="652" y="68" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="17" font-weight="800" fill="#0B1220">3</text>
    <text x="680" y="68" font-family="'Segoe UI', system-ui, sans-serif" font-size="17" font-weight="700" fill="#F8FAFC">Every change visible</text>
    <rect x="634" y="88" width="238" height="176" rx="12" fill="#0F172A" stroke="#273449"/>
    <g font-family="ui-monospace, Consolas, monospace" font-size="13.5">
      <text x="654" y="120" fill="#E2E8F0">PR #42 · CLAWPRINT.md</text>
      <rect x="648" y="132" width="212" height="24" rx="4" fill="#132A1A"/>
      <text x="654" y="149" fill="#4AC26B">+ network: api.evil.test</text>
      <rect x="648" y="162" width="212" height="24" rx="4" fill="#2D1517"/>
      <text x="654" y="179" fill="#FF7B72">- (was: nothing)</text>
      <text x="654" y="218" fill="#E2E8F0">CI: <tspan fill="#FF7B72" font-weight="700">✗ clawprint check</tspan></text>
      <text x="654" y="244" fill="#64748B">a human decides, not an AI</text>
    </g>
  </g>

  <text x="450" y="298" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" fill="#64748B">deterministic output · same input tree ⇒ byte-identical manifest · nothing leaves your machine</text>
</svg>
