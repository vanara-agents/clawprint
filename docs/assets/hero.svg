<svg xmlns="http://www.w3.org/2000/svg" width="900" height="250" viewBox="0 0 900 250" role="img" aria-label="clawprint — the capability manifest for your .claude directory">
  <defs>
    <linearGradient id="claw" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="bgfade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#101A2E"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="898" height="248" rx="18" fill="url(#bgfade)" stroke="#1E293B" stroke-width="2"/>

  <!-- fingerprint arcs -->
  <g transform="translate(118,125)" fill="none" stroke="#334155" stroke-width="3" stroke-linecap="round">
    <circle r="30" stroke-dasharray="60 34 40 55"/>
    <circle r="46" stroke-dasharray="90 40 70 90" transform="rotate(40)"/>
    <circle r="62" stroke-dasharray="110 60 80 140" transform="rotate(-25)"/>
    <circle r="78" stroke-dasharray="120 90 110 170" transform="rotate(70)" stroke="#26334A"/>
  </g>
  <!-- claw slashes over the print -->
  <g stroke="url(#claw)" stroke-linecap="round" fill="none">
    <path d="M 76 78 Q 108 118 118 172" stroke-width="11"/>
    <path d="M 112 66 Q 136 114 142 166" stroke-width="9"/>
    <path d="M 148 62 Q 164 108 166 156" stroke-width="7"/>
  </g>

  <!-- wordmark -->
  <text x="238" y="112" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="58" font-weight="800" fill="#F8FAFC" letter-spacing="-1">clawprint</text>
  <text x="240" y="150" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="19" fill="#94A3B8">Know what your agent setup <tspan fill="#E2E8F0" font-weight="600">can do</tspan> — and catch every change in review.</text>

  <!-- trait pills -->
  <g font-family="'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="600">
    <rect x="240" y="176" width="98" height="30" rx="15" fill="#111B2E" stroke="#2A3A55"/>
    <text x="289" y="196" text-anchor="middle" fill="#FBBF24">zero deps</text>
    <rect x="348" y="176" width="118" height="30" rx="15" fill="#111B2E" stroke="#2A3A55"/>
    <text x="407" y="196" text-anchor="middle" fill="#FBBF24">deterministic</text>
    <rect x="476" y="176" width="78" height="30" rx="15" fill="#111B2E" stroke="#2A3A55"/>
    <text x="515" y="196" text-anchor="middle" fill="#FBBF24">no AI</text>
    <rect x="564" y="176" width="130" height="30" rx="15" fill="#111B2E" stroke="#2A3A55"/>
    <text x="629" y="196" text-anchor="middle" fill="#FBBF24">runs offline</text>
    <rect x="704" y="176" width="120" height="30" rx="15" fill="#111B2E" stroke="#2A3A55"/>
    <text x="764" y="196" text-anchor="middle" fill="#FBBF24">one file</text>
  </g>
</svg>
