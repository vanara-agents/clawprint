<svg xmlns="http://www.w3.org/2000/svg" width="900" height="250" viewBox="0 0 900 250" role="img" aria-label="clawprint — a clawprint check run failing a pull request that quietly added a new network host to a skill">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A0E1A"/>
      <stop offset="1" stop-color="#0E1524"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="898" height="248" rx="18" fill="url(#bg)" stroke="#1C2740" stroke-width="2"/>

  <!-- terminal panel -->
  <rect x="30" y="28" width="486" height="194" rx="12" fill="#0C121F" stroke="#1E2A42" stroke-width="1.5"/>
  <circle cx="52" cy="50" r="5" fill="#F87171"/>
  <circle cx="70" cy="50" r="5" fill="#FBBF24"/>
  <circle cx="88" cy="50" r="5" fill="#34D399"/>
  <text x="273" y="55" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#5B6B85">clawprint check</text>
  <line x1="30" y1="70" x2="516" y2="70" stroke="#1E2A42" stroke-width="1.5"/>

  <!-- terminal content -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14.5">
    <text x="52" y="100"><tspan fill="#FBBF24">$</tspan> <tspan fill="#CBD5E1">npx clawprint check</tspan></text>
    <text x="52" y="126" fill="#64748B">scanning .claude/ … 41 items</text>
    <text x="52" y="164" fill="#F87171">+ [skills/pdf-helper] network:</text>
    <text x="66" y="186" fill="#F87171">api.evil.test</text>
    <rect x="196" y="172" width="46" height="20" rx="10" fill="#2A1416" stroke="#7F1D1D"/>
    <text x="219" y="186.5" text-anchor="middle" font-size="11.5" font-weight="700" fill="#FCA5A5">NEW</text>
    <text x="52" y="210" fill="#F87171" font-weight="700">✗ FAIL — 1 new capability</text>
  </g>

  <!-- claw glyph -->
  <g transform="translate(546,50)" stroke="url(#amber)" stroke-linecap="round" fill="none">
    <path d="M 0 0 Q 14 20 18 44" stroke-width="7"/>
    <path d="M 16 -4 Q 27 18 30 40" stroke-width="6"/>
    <path d="M 32 -6 Q 40 14 41 34" stroke-width="5"/>
  </g>

  <!-- wordmark + tagline -->
  <text x="600" y="86" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="44" font-weight="800" fill="#F8FAFC" letter-spacing="-1">clawprint</text>
  <rect x="602" y="98" width="54" height="4" rx="2" fill="url(#amber)"/>

  <text x="548" y="141" font-family="'Segoe UI', system-ui, sans-serif" font-size="16.5" fill="#94A3B8">The capability manifest for your <tspan fill="#E2E8F0" font-weight="600">.claude/</tspan></text>
  <text x="548" y="165" font-family="'Segoe UI', system-ui, sans-serif" font-size="16.5" fill="#94A3B8">directory — every change caught in review.</text>

  <text x="548" y="205" font-family="'Segoe UI', system-ui, sans-serif" font-size="13.5" fill="#5B6B85">zero deps <tspan fill="#F59E0B">·</tspan> deterministic <tspan fill="#F59E0B">·</tspan> no AI <tspan fill="#F59E0B">·</tspan> offline <tspan fill="#F59E0B">·</tspan> one file</text>
</svg>
